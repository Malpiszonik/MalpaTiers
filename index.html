<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MCTIERS GLOBAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0b0b; --card-bg: #161616; --accent: #ffaa00; --ht-color: #ff4444; --lt-color: #44ff44; --gray: #888; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        #admin-section { display: none; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; outline: none; width: 90%; }
        .btn-save { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px; cursor: pointer; border-radius: 6px; width: 100%; text-transform: uppercase; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .filter-btn { background: #222; color: #fff; border: 1px solid #333; padding: 8px 18px; cursor: pointer; border-radius: 20px; transition: 0.3s; font-size: 12px; font-weight: bold; }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .table-container { background: var(--card-bg); border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #1f1f1f; color: var(--gray); padding: 15px; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #1f1f1f; }
        tr:hover { background: #1d1d1d; }
        .tier { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 11px; min-width: 30px; }
        .ht { color: var(--ht-color); border: 1px solid var(--ht-color); background: rgba(255,68,68,0.1); }
        .lt { color: var(--lt-color); border: 1px solid var(--lt-color); background: rgba(68,255,68,0.1); }
        .na { color: #444; border: 1px solid #222; }
        .admin-only { display: none; }
        .action-btn { background: #333; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin: 0 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MCTIERS GLOBAL</h1>
        <p style="color: var(--gray)">Competitive PvP Leaderboard</p>
    </div>

    <div id="admin-section">
        <h3 id="form-title" style="margin:0 0 15px 0">Admin Panel Active</h3>
        <input type="hidden" id="edit-key">
        <div class="form-grid">
            <input type="text" id="p-name" placeholder="Nick">
            <input type="text" id="p-sword" placeholder="Sword">
            <input type="text" id="p-uhc" placeholder="UHC">
            <input type="text" id="p-axe" placeholder="Axe">
            <input type="text" id="p-crystal" placeholder="Crystal">
            <input type="text" id="p-mace" placeholder="Mace">
            <input type="text" id="p-nethpot" placeholder="Nethpot">
            <input type="text" id="p-smp" placeholder="SMP">
        </div>
        <button class="btn-save" onclick="saveToCloud()">Save Changes</button>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setMode('all')">OVERALL</button>
        <button class="filter-btn" onclick="setMode('sword')">SWORD</button>
        <button class="filter-btn" onclick="setMode('crystal')">CRYSTAL</button>
        <button class="filter-btn" onclick="setMode('mace')">MACE</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th><th>Player</th><th>Points</th><th>Sword</th><th>UHC</th><th>Axe</th><th>Crystal</th><th>Mace</th><th>Nethpot</th><th>SMP</th><th class="admin-only">Actions</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAiWnRyj3Vlrcx-KZuy-6VHyjy9oSku80Q",
        authDomain: "pvp-tiers-ea649.firebaseapp.com",
        databaseURL: "https://pvp-tiers-ea649-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "pvp-tiers-ea649",
        storageBucket: "pvp-tiers-ea649.firebasestorage.app",
        messagingSenderId: "471301418532",
        appId: "1:471301418532:web:a1dc6ef2e7c6369dc5f2b1"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tierPoints = { 'HT1': 10, 'LT1': 9, 'HT2': 8, 'LT2': 7, 'HT3': 6, 'LT3': 5, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };
    let currentMode = 'all';
    
    // TWOJA TAJNA FRAZA DO LINKU:
    const SECRET_KEY = "MalpizonAdmin"; 
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === SECRET_KEY;

    if(isAdmin) {
        document.getElementById('admin-section').style.display = 'block';
    }

    db.ref('players').on('value', (s) => {
        window.dataCache = s.val();
        render();
    });

    function saveToCloud() {
        if(!isAdmin) return;
        const key = document.getElementById('edit-key').value;
        const name = document.getElementById('p-name').value;
        if(!name) return alert("Nick?");

        const pData = {
            name,
            sword: document.getElementById('p-sword').value,
            uhc: document.getElementById('p-uhc').value,
            axe: document.getElementById('p-axe').value,
            crystal: document.getElementById('p-crystal').value,
            mace: document.getElementById('p-mace').value,
            nethpot: document.getElementById('p-nethpot').value,
            smp: document.getElementById('p-smp').value
        };

        key ? db.ref('players/' + key).update(pData) : db.ref('players').push(pData);
        document.querySelectorAll('#admin-section input').forEach(i => i.value = '');
        document.getElementById('edit-key').value = '';
    }

    function render() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');

        if(!window.dataCache) return;
        let list = Object.keys(window.dataCache).map(k => ({ id: k, ...window.dataCache[k] }));

        list.forEach(p => {
            let sum = 0;
            ['sword','uhc','axe','crystal','mace','nethpot','smp'].forEach(k => sum += tierPoints[(p[k]||'').toUpperCase()] || 0);
            p.total = sum;
        });

        list.sort((a, b) => {
            if (currentMode === 'all') return b.total - a.total;
            return (tierPoints[(b[currentMode]||'').toUpperCase()] || 0) - (tierPoints[(a[currentMode]||'').toUpperCase()] || 0);
        });

        list.forEach((p, i) => {
            tbody.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td><strong>${p.name}</strong></td>
                    <td style="color:var(--accent)">${p.total}</td>
                    ${['sword','uhc','axe','crystal','mace','nethpot','smp'].map(k => `<td>${fmt(p[k])}</td>`).join('')}
                    <td class="admin-only" style="display:${isAdmin ? 'table-cell' : 'none'}">
                        <button class="action-btn" onclick="editP('${p.id}')">✎</button>
                        <button class="action-btn" onclick="delP('${p.id}')">×</button>
                    </td>
                </tr>`;
        });
    }

    function fmt(v) {
        if (!v) return '<span class="tier na">N/A</span>';
        let val = v.toUpperCase().trim();
        return `<span class="tier ${val.includes('HT')?'ht':'lt'}">${val}</span>`;
    }

    function editP(id) {
        const p = window.dataCache[id];
        document.getElementById('edit-key').value = id;
        document.getElementById('p-name').value = p.name;
        ['sword','uhc','axe','crystal','mace','nethpot','smp'].forEach(k => document.getElementById('p-'+k).value = p[k] || '');
        window.scrollTo(0,0);
    }

    function delP(id) { if(confirm("Del?")) db.ref('players/' + id).remove(); }
    function setMode(m) { currentMode = m; render(); }
</script>
</body>
</html>
